<div class="product-row">

    <input
        type="text"
        class="product-id"
        placeholder="Product ID"
        required
    >

    <input
        type="number"
        class="quantity"
        placeholder="Quantity"
        min="1"
        required
    >

    <button
        type="button"
        class="remove-product"
    >
        Remove
    </button>

</div>
